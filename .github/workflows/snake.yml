name: Generate Snake Animation

on:
  # Her 12 saatte bir otomatik güncelle
  schedule:
    - cron: "0 */12 * * *"
  # Elle tetiklemek için (Actions sekmesinden "Run workflow")
  workflow_dispatch:
  # Ana dala push olduğunda çalışsın (repon main ise "main", master ise "master" bırak)
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Yılan SVG üret
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00ff9f&color_dots=161b22,0e4429,006d32,26a641,39d353

      - name: output dalına gönder
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
